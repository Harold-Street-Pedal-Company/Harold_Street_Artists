<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harold Street Players</title>

<style>

:root{
--bg:#f5f5f2;
--panel:#ffffff;
--text:#121212;
--muted:#666;
--line:#d8d8d2;
--accent:#111;
--accent-inverse:#fff;
--shadow:0 6px 20px rgba(0,0,0,0.08);
--radius:18px;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:var(--bg);
color:var(--text);
}

img{
max-width:100%;
display:block;
}

.wrap{
width:100%;
padding:14px 10px 40px;
}

/* HERO */

.hero{
background:linear-gradient(135deg,#ffffff 0%,#efefea 100%);
border:1px solid var(--line);
border-radius:18px;
box-shadow:var(--shadow);
margin-bottom:18px;
}

.hero-inner{
display:grid;
grid-template-columns:1.6fr 1fr;
gap:18px;
padding:18px;
align-items:start;
}

.eyebrow{
font-size:11px;
font-weight:700;
letter-spacing:1.2px;
text-transform:uppercase;
padding:6px 10px;
border:1px solid var(--line);
border-radius:999px;
background:#fff;
display:inline-block;
margin-bottom:10px;
}

h1{
margin:0 0 8px;
font-size:clamp(2rem,3vw,3rem);
text-transform:uppercase;
letter-spacing:-1px;
}

.hero p{
margin:0;
color:#333;
}

.hero-side{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.stat{
background:#fff;
border:1px solid var(--line);
border-radius:14px;
padding:12px;
min-height:80px;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.stat-num{
font-size:1.8rem;
font-weight:700;
}

.stat-label{
font-size:.9rem;
color:var(--muted);
}

/* SEARCH BAR */

.controls{
margin-bottom:16px;
}

.controls-inner{
display:grid;
grid-template-columns:1.5fr 1fr auto;
gap:10px;
background:#fff;
border:1px solid var(--line);
border-radius:14px;
padding:10px;
}

.search input,
.filter select{
width:100%;
border:1px solid var(--line);
border-radius:10px;
padding:12px;
font-size:14px;
}

.results-count{
font-size:14px;
color:var(--muted);
align-self:center;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
}

/* CARD */

.card{
background:#fff;
border:1px solid var(--line);
border-radius:var(--radius);
overflow:hidden;
box-shadow:var(--shadow);
transition:.2s;
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-3px);
}

.card-media{
aspect-ratio:1/1;
overflow:hidden;
border-bottom:1px solid var(--line);
}

.card-media img{
width:100%;
height:100%;
object-fit:cover;
}

.card-body{
padding:16px;
display:flex;
flex-direction:column;
gap:8px;
}

.artist-name{
margin:0;
font-size:1.2rem;
text-transform:uppercase;
}

.artist-meta{
font-size:.9rem;
color:var(--muted);
}

.artist-blurb{
font-size:.95rem;
}

.tag-row{
display:flex;
flex-wrap:wrap;
gap:6px;
}

.tag{
font-size:11px;
padding:6px 8px;
border:1px solid var(--line);
border-radius:999px;
background:#fafafa;
}

.btn{
background:#111;
color:#fff;
border:none;
border-radius:10px;
padding:8px 12px;
cursor:pointer;
margin-top:4px;
}

.details{
display:none;
margin-top:10px;
padding-top:10px;
border-top:1px solid var(--line);
}

.card.open .details{
display:block;
}

.quote{
background:#f7f7f4;
padding:10px;
border-left:4px solid #111;
border-radius:6px;
font-style:italic;
margin-top:6px;
}

.socials{
display:flex;
flex-wrap:wrap;
gap:6px;
margin-top:6px;
}

.socials a{
font-size:12px;
padding:6px 8px;
border:1px solid var(--line);
border-radius:999px;
text-decoration:none;
color:#111;
}

/* MOBILE */

@media(max-width:900px){

.hero-inner{
grid-template-columns:1fr;
}

.controls-inner{
grid-template-columns:1fr;
}

.grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="wrap">

<section class="hero">
<div class="hero-inner">

<div>
<div class="eyebrow">Harold Street Team</div>
<h1>Harold Street Players</h1>

<p>
Artists and bands using Harold Street Pedals in studios,
basements, rehearsal spaces, and live rigs.
</p>
</div>

<div class="hero-side">

<div class="stat">
<div class="stat-num" id="artistCount">0</div>
<div class="stat-label">Artists</div>
</div>

<div class="stat">
<div class="stat-num" id="pedalCount">0</div>
<div class="stat-label">Pedals</div>
</div>

<div class="stat">
<div class="stat-num">Local</div>
<div class="stat-label">Hamilton built</div>
</div>

<div class="stat">
<div class="stat-num">Live</div>
<div class="stat-label">Real boards</div>
</div>

</div>
</div>
</section>


<section class="controls">

<div class="controls-inner">

<div class="search">
<input id="searchInput" placeholder="Search artist, band, city or pedal">
</div>

<div class="filter">
<select id="pedalFilter">
<option value="all">All pedals</option>
</select>
</div>

<div class="results-count">
<span id="visibleCount">0</span> visible
</div>

</div>
</section>


<section class="grid" id="artistGrid"></section>

</div>


<script>

const artists = [

{
name:"Artist Name",
band:"Band / Project",
city:"Hamilton",
category:"Indie",
image:"images/artist1.jpg",
blurb:"Short bio about the artist and their sound.",
pedals:["Scavenger","Skulptër"],
quote:"The pedal sits perfectly in a band mix.",
links:{
instagram:"#",
spotify:"#"
}
},

{
name:"Second Artist",
band:"Another Project",
city:"Toronto",
category:"Garage Rock",
image:"images/artist2.jpg",
blurb:"Another short artist description.",
pedals:["Crazy Gain Distortion"],
quote:"Cuts without sounding thin.",
links:{
instagram:"#"
}
},

{
name:"Third Artist",
band:"Session / Solo",
city:"Burlington",
category:"Psych",
image:"images/artist3.jpg",
blurb:"Experimental textures and big dynamic tones.",
pedals:["Scavenger"],
quote:"These pedals react like instruments.",
links:{
youtube:"#"
}
}

];

const grid=document.getElementById("artistGrid");
const searchInput=document.getElementById("searchInput");
const pedalFilter=document.getElementById("pedalFilter");
const visibleCount=document.getElementById("visibleCount");
const artistCount=document.getElementById("artistCount");
const pedalCount=document.getElementById("pedalCount");

function uniquePedals(data){
return [...new Set(data.flatMap(a=>a.pedals))];
}

function buildFilter(){

const pedals=uniquePedals(artists);

pedalCount.textContent=pedals.length;
artistCount.textContent=artists.length;

pedals.forEach(p=>{

const opt=document.createElement("option");
opt.value=p.toLowerCase();
opt.textContent=p;
pedalFilter.appendChild(opt);

});

}

function render(){

grid.innerHTML=artists.map((artist,i)=>`

<article class="card"
data-search="${(artist.name+artist.band+artist.city+artist.pedals.join(" ")).toLowerCase()}"
data-pedals="${artist.pedals.join("|").toLowerCase()}">

<div class="card-media">
<img src="${artist.image}">
</div>

<div class="card-body">

<h2 class="artist-name">${artist.name}</h2>
<div class="artist-meta">${artist.band} · ${artist.city}</div>

<div class="artist-blurb">${artist.blurb}</div>

<div class="tag-row">
${artist.pedals.map(p=>`<span class="tag">${p}</span>`).join("")}
</div>

<button class="btn" onclick="toggle(${i})">More</button>

<div class="details" id="d${i}">

<div class="quote">"${artist.quote}"</div>

<div class="socials">
${Object.entries(artist.links).map(([k,v])=>`<a href="${v}" target="_blank">${k}</a>`).join("")}
</div>

</div>

</div>

</article>

`).join("");

updateCount();

}

function toggle(i){

const card=document.getElementById("d"+i).parentElement.parentElement;
card.classList.toggle("open");

}

function filter(){

const q=searchInput.value.toLowerCase();
const pedal=pedalFilter.value;

let shown=0;

document.querySelectorAll(".card").forEach(c=>{

const search=c.dataset.search;
const pedals=c.dataset.pedals;

const okSearch=!q||search.includes(q);
const okPedal=pedal==="all"||pedals.includes(pedal);

const show=okSearch&&okPedal;

c.style.display=show?"":"none";

if(show) shown++;

});

visibleCount.textContent=shown;

}

function updateCount(){

visibleCount.textContent=document.querySelectorAll(".card").length;

}

buildFilter();
render();

searchInput.addEventListener("input",filter);
pedalFilter.addEventListener("change",filter);

</script>

</body>
</html>
